server.port=8082
spring.application.name=party-role-service
spring.servlet.context-path=/tmf-api/partyManagement/v4

# Database — update username/password to match your local MariaDB credentials
spring.datasource.url=jdbc:mariadb://localhost:3306/jio_party
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# RFC 3339 date serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
